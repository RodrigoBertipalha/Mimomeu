<script>
        // Micro-interaction for input fields
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                const icon = input.previousElementSibling;
                if (icon) icon.classList.add('text-primary');
            });
            input.addEventListener('blur', () => {
                const icon = input.previousElementSibling;
                if (icon) icon.classList.remove('text-primary');
            });
        });

        // Subtle parallax effect on floating images
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            
            const decorImages = document.querySelectorAll('main > div[class*="absolute"]');
            decorImages.forEach((img, index) => {
                const speed = (index + 1) * 0.5;
                img.style.transform = `translate(${moveX * speed}px, ${moveY * speed}px) rotate(${index === 0 ? -6 : 3}deg)`;
            });
        });
    </script>

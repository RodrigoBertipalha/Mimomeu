<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }
        
        /* Glassmorphism utilities */
        .glass-panel {
            background: theme('colors.surface-container');
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        .ambient-glow {
            box-shadow: 0 0 40px 10px rgba(190, 205, 164, 0.05);
        }

        .ambient-glow-focus:focus-within {
             box-shadow: 0 0 30px 5px rgba(190, 205, 164, 0.1);
        }
        
        /* Custom Inputs */
        .custom-input {
            background-color: theme('colors.surface-dim');
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: theme('colors.on-surface');
            transition: all 0.3s ease;
        }
        .custom-input:focus {
            outline: none;
            border-color: theme('colors.primary');
            box-shadow: 0 0 0 1px theme('colors.primary');
        }
        .custom-input::placeholder {
            color: theme('colors.on-surface-variant');
        }
        
        /* Date Input Dark Mode Icon Fix */
        ::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.5;
        }
    </style>

<body class="antialiased min-h-screen flex flex-col font-body-md text-body-md selection:bg-primary/30 selection:text-primary">
<!-- TopNavBar (Semantic Shell) -->
<header class="bg-surface/80 backdrop-blur-xl docked full-width top-0 sticky z-50 bg-surface/80 border-b border-white/5 shadow-[0_20px_40px_rgba(0,0,0,0.15)] flex justify-between items-center px-margin-desktop py-base w-full max-w-7xl mx-auto md:flex hidden">
<div class="font-headline-md text-headline-md font-bold text-primary flex items-center gap-sm">
<span>Mimo Meu</span>
</div>
<nav class="flex items-center gap-md">
<a class="text-on-surface-variant font-medium hover:text-on-surface transition-colors hover:bg-surface-variant/50 transition-all duration-300 px-sm py-xs rounded-lg font-label-lg text-label-lg" href="#">Home</a>
<a class="text-on-surface-variant font-medium hover:text-on-surface transition-colors hover:bg-surface-variant/50 transition-all duration-300 px-sm py-xs rounded-lg font-label-lg text-label-lg" href="#">My Lists</a>
<a class="text-on-surface-variant font-medium hover:text-on-surface transition-colors hover:bg-surface-variant/50 transition-all duration-300 px-sm py-xs rounded-lg font-label-lg text-label-lg" href="#">Activity</a>
<a class="text-on-surface-variant font-medium hover:text-on-surface transition-colors hover:bg-surface-variant/50 transition-all duration-300 px-sm py-xs rounded-lg font-label-lg text-label-lg" href="#">Profile</a>
</nav>
<div class="flex items-center">
<!-- Create List is active intent, but since this is the creation page, button is here for structural consistency, maybe disabled or just acting as a label -->
<button class="bg-primary/20 text-primary font-label-lg text-label-lg px-md py-sm rounded-lg opacity-50 cursor-not-allowed">
                Create List
            </button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex items-center justify-center px-margin-mobile md:px-margin-desktop py-lg relative overflow-hidden">
<!-- Decorative Ambient Background Elements -->
<div class="absolute top-0 left-1/4 w-[500px] h-[500px] bg-primary/5 rounded-full blur-[120px] -z-10 pointer-events-none"></div>
<div class="absolute bottom-0 right-1/4 w-[400px] h-[400px] bg-secondary/5 rounded-full blur-[100px] -z-10 pointer-events-none"></div>
<!-- Form Container -->
<div class="w-full max-w-2xl glass-panel rounded-xl p-md md:p-lg ambient-glow ambient-glow-focus relative z-10 transform transition-all duration-500 ease-out translate-y-0 opacity-100 animate-[fadeInUp_0.6s_ease-out]">
<!-- Header -->
<div class="mb-lg text-center md:text-left">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-base">Criar Lista</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Conte-nos sobre sua celebração para personalizarmos sua experiência.</p>
</div>
<form action="#" class="space-y-md" method="POST">
<!-- Nome do Evento -->
<div class="space-y-base flex flex-col">
<label class="font-label-lg text-label-lg text-on-surface" for="event-name">Nome do evento ou lista</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">edit_note</span>
<input class="custom-input w-full rounded-lg pl-lg pr-sm py-sm font-body-md text-body-md focus:ring-0" id="event-name" name="event-name" placeholder="Ex: Casamento da Maria e João" type="text"/>
</div>
</div>
<!-- Grid for Type and Date -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- Tipo de Evento -->
<div class="space-y-base flex flex-col">
<label class="font-label-lg text-label-lg text-on-surface" for="event-type">Tipo de evento</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">celebration</span>
<select class="custom-input w-full rounded-lg pl-lg pr-lg py-sm font-body-md text-body-md appearance-none focus:ring-0" id="event-type" name="event-type">
<option disabled="" selected="" value="">Selecione uma categoria</option>
<option value="casamento">Casamento</option>
<option value="aniversario">Aniversário</option>
<option value="chadebebe">Chá de Bebê</option>
<option value="formatura">Formatura</option>
<option value="outro">Outro</option>
</select>
<span class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
<!-- Data do Evento -->
<div class="space-y-base flex flex-col">
<label class="font-label-lg text-label-lg text-on-surface" for="event-date">Data do evento</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">calendar_month</span>
<input class="custom-input w-full rounded-lg pl-lg pr-sm py-sm font-body-md text-body-md focus:ring-0" id="event-date" name="event-date" type="date"/>
</div>
</div>
</div>
<!-- Actions -->
<div class="pt-md mt-lg border-t border-white/5 flex flex-col-reverse md:flex-row justify-end items-center gap-sm">
<button class="w-full md:w-auto px-md py-sm rounded-lg font-label-lg text-label-lg text-on-surface-variant border border-outline-variant hover:bg-surface-variant/50 hover:text-on-surface transition-all duration-300" type="button">
                        Voltar
                    </button>
<button class="w-full md:w-auto px-md py-sm rounded-lg font-label-lg text-label-lg bg-primary text-on-primary hover:bg-primary-fixed transition-colors duration-300 shadow-[0_0_20px_rgba(190,205,164,0.3)] hover:shadow-[0_0_30px_rgba(190,205,164,0.5)]" type="submit">
                        Salvar lista
                    </button>
</div>
</form>
</div>
</main>
<!-- Footer -->
<footer class="bg-surface-container-lowest border-t border-white/5 flex flex-col md:flex-row justify-between items-center px-margin-desktop py-lg w-full max-w-7xl mx-auto">
<div class="text-on-surface font-bold font-body-md text-body-md mb-sm md:mb-0">
            © 2024 Mimo Meu. All rights reserved.
        </div>
<nav class="flex gap-md font-label-sm text-label-sm">
<a class="text-on-surface-variant hover:text-primary transition-colors opacity-80 hover:opacity-100" href="#">About</a>
<a class="text-on-surface-variant hover:text-primary transition-colors opacity-80 hover:opacity-100" href="#">Privacy</a>
<a class="text-on-surface-variant hover:text-primary transition-colors opacity-80 hover:opacity-100" href="#">Terms</a>
<a class="text-on-surface-variant hover:text-primary transition-colors opacity-80 hover:opacity-100" href="#">Support</a>
</nav>
</footer>
<style>
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</body></html>
